name: Scan feeds

on:
  schedule:
    # Every 4 hours, on the hour (UTC). GitHub cron is best-effort and may lag.
    - cron: '0 */4 * * *'
  # Allow running it by hand from the Actions tab.
  workflow_dispatch:

# Never let two scans overlap; a new run waits rather than racing the DB.
concurrency:
  group: scan-feeds
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run scan
        run: npm run scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
